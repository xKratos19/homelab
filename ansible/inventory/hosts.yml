---
all:
  vars:
    ansible_user: root
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
    ansible_python_interpreter: auto_silent

  children:
    docker:
      hosts:
        apps:
          ansible_host: 192.168.1.130
          lxc_id: 101
          description: "Primary Docker host"
        docker_testing:
          ansible_host: 192.168.1.150
          lxc_id: 107
          description: "Testing environment"
    automation:
      hosts:
        n8n:
          ansible_host: 192.168.1.133
          lxc_id: 102
          description: "Workflow automation engine"
    network:
      hosts:
        adguard:
          ansible_host: 192.168.1.3
          lxc_id: 103
          description: "DNS ad blocker"
    media:
      hosts:
        jellyfin:
          ansible_host: 192.168.1.135
          lxc_id: 105
          description: "Media streaming server"
        wizarr:
          ansible_host: 192.168.1.145
          lxc_id: 106
          description: "Jellyfin invite management"
        lyrion:
          ansible_host: 192.168.1.161
          lxc_id: 110
          description: "Lyrion Music Server"
    speed:
      hosts:
        myspeed:
          ansible_host: 192.168.1.136
          lxc_id: 108
          description: "Internet speed monitoring"
    observability:
      hosts:
        monitoring:
          ansible_host: 192.168.1.173
          lxc_id: 111
          description: "Prometheus + Grafana monitoring stack"
